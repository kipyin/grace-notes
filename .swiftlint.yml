disabled_rules: []
opt_in_rules: []
included:
  - GraceNotes/GraceNotes
  - GraceNotesTests
  - GraceNotesUITests
excluded:
  - .build
  - DerivedData
line_length:
  warning: 120
  error: 200
type_body_length:
  warning: 250
  error: 400
function_body_length:
  warning: 50
  error: 80
cyclomatic_complexity:
  warning: 10
  error: 15
# Several primary screens sit just above the default 400-line cap; keep a single consistent threshold.
file_length:
  warning: 620
  error: 1200
identifier_name:
  min_length: 3
  max_length: 40
