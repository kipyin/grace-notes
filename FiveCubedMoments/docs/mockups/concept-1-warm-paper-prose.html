<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Warm Paper + Journal Prose — Five Cubed Moments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F8F4EF;
      --paper: #F5EDE4;
      --text: #2C2C2C;
      --text-muted: #5C5346;
      --accent: #C77B5B;
      --border: #E5DDD4;
      --complete: #8B9A7D;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Source Serif 4', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      line-height: 1.6;
    }
    .device {
      max-width: 390px;
      margin: 0 auto;
      background: var(--paper);
      border-radius: 36px;
      padding: 24px 20px 40px;
      box-shadow: 0 4px 24px rgba(44, 44, 44, 0.08);
    }
    .header { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; margin-bottom: 24px; color: var(--text); }
    .section { margin-bottom: 28px; }
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .date-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.5);
      border-radius: 14px;
      border: 1px solid var(--border);
      font-size: 15px;
    }
    .badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: var(--complete); color: white; margin-left: auto; }

    /* Prose block — one flowing line: intro + inline slots with dots */
    .prose-block {
      padding: 16px 18px;
      background: rgba(255,255,255,0.5);
      border-radius: 14px;
      border: 1px solid var(--border);
      font-size: 16px;
      line-height: 2;
      color: var(--text);
    }
    .prose-block:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(199,123,91,0.2); outline: none; }
    .prose-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 8px;
    }
    .prose-intro { color: var(--text-muted); flex-shrink: 0; }
    .prose-slot {
      width: 4em;
      min-width: 48px;
      max-width: 100%;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      font-family: inherit;
      font-size: inherit;
      color: var(--text);
      padding: 2px 4px;
    }
    .prose-slot:focus { outline: none; border-bottom-color: var(--accent); }
    .prose-slot::placeholder { color: var(--text-muted); opacity: 0.5; }
    .prose-dot { color: var(--text-muted); flex-shrink: 0; }

    .textarea {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,0.6);
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      min-height: 100px;
      resize: vertical;
    }
    .textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(199,123,91,0.2); }
    .textarea::placeholder { color: var(--text-muted); opacity: 0.7; }

    .share-btn { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 10px; background: var(--accent); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .concept-label { text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
  </style>
</head>
<body>
  <p class="concept-label">Warm Paper + Journal Prose — Fill in the sentence</p>
  <div class="device">
    <button class="share-btn" aria-label="Share">↑</button>
    <h1 class="header">Today's 5³</h1>

    <div class="section">
      <div class="section-label">Date</div>
      <div class="date-row">Mar 15, 2025 <span class="badge">Completed</span></div>
    </div>

    <div class="section">
      <div class="section-label">Gratitudes</div>
      <div class="prose-block">
        <div class="prose-line">
          <span class="prose-intro">I'm grateful for</span>
          <input class="prose-slot" placeholder="1" value="Family">
          <span class="prose-dot">·</span>
          <input class="prose-slot" placeholder="2" value="Coffee">
          <span class="prose-dot">·</span>
          <input class="prose-slot" placeholder="3">
          <span class="prose-dot">·</span>
          <input class="prose-slot" placeholder="4">
          <span class="prose-dot">·</span>
          <input class="prose-slot" placeholder="5">
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Needs</div>
      <div class="prose-block">
        <div class="prose-line">
          <span class="prose-intro">Today I need</span>
          <input class="prose-slot" placeholder="1" value="Patience">
          <span class="prose-dot">·</span>
          <input class="prose-slot" placeholder="2" value="Rest">
          <span class="prose-dot">·</span>
          <input class="prose-slot" placeholder="3">
          <span class="prose-dot">·</span>
          <input class="prose-slot" placeholder="4">
          <span class="prose-dot">·</span>
          <input class="prose-slot" placeholder="5">
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">People To Pray For</div>
      <div class="prose-block">
        <div class="prose-line">
          <span class="prose-intro">Holding in prayer</span>
          <input class="prose-slot" placeholder="1" value="Sarah">
          <span class="prose-dot">·</span>
          <input class="prose-slot" placeholder="2">
          <span class="prose-dot">·</span>
          <input class="prose-slot" placeholder="3">
          <span class="prose-dot">·</span>
          <input class="prose-slot" placeholder="4">
          <span class="prose-dot">·</span>
          <input class="prose-slot" placeholder="5">
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Bible Notes</div>
      <textarea class="textarea" placeholder="Write your notes..."></textarea>
    </div>

    <div class="section">
      <div class="section-label">Reflections</div>
      <textarea class="textarea" placeholder="Reflect on your day..."></textarea>
    </div>
  </div>
</body>
</html>
