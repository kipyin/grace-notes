name: iOS CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
      - name: Xcode version
        run: xcodebuild -version
      - name: Build and test
        run: |
          # Pick first available iPhone simulator (avoids hardcoded name/OS mismatch across runner images)
          if ! DEST=$(xcrun simctl list devices -j \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          for runtime, devices in d.get('devices', {}).items():
            if 'iOS' not in runtime:
              continue
            for dev in devices:
              if dev.get('isAvailable') and 'iPhone' in dev.get('name', ''):
                # Use id only; name+id can cause xcodebuild to infer OS:latest and fail to match
                print(f\"platform=iOS Simulator,id={dev['udid']}\")
                sys.exit(0)
          sys.exit(1)
          "); then
            echo "No iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using destination: $DEST"
          xcodebuild \
            -project FiveCubedMoments/FiveCubedMoments.xcodeproj \
            -scheme FiveCubedMoments \
            -destination "$DEST" \
            -only-testing:FiveCubedMomentsTests \
            test
