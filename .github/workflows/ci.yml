name: CI

# Triggers (avoid duplicate runs):
# - pull_request → PRs targeting main (build always; full suite when label `full-ci`).
# - push → only default branch after merge (build sanity on main).
# - merge_group → merge queue commits (lint + tests + XR smoke via Makefile).
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  merge_group:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned OS versions (XR + `OS=latest` is unreliable on hosted runners). Override if simctl list changes.
  CI_SIMULATOR_PRO: platform=iOS Simulator,name=iPhone 17 Pro,OS=26.3
  CI_SIMULATOR_XR: platform=iOS Simulator,name=iPhone XR,OS=17.5

jobs:
  build:
    name: Build (iPhone 17 Pro)
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: make ci-build

  merge-queue:
    name: Merge queue — lint, test, UI smoke
    if: github.event_name == 'merge_group'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Full CI (make)
        run: make ci-merge-queue

  pr-full-ci:
    name: PR full-ci — lint, test, UI smoke
    if: >
      github.event_name == 'pull_request' &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'full-ci')
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Full CI (make)
        run: make ci-pr-full-ci
