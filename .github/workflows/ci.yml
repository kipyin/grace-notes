name: CI

# Triggers (avoid duplicate runs):
# - pull_request → PRs targeting main (lint + build always; full suite when label `full-ci`).
# - push → only default branch (rare: bypass/automation); full CI same as merge queue.
# - merge_group → merge queue commits (lint + tests + XR smoke via Makefile).
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  merge_group:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_SIMULATOR_PRO: platform=iOS Simulator,name=iPhone 17 Pro,OS=26.2
  CI_SIMULATOR_XR: platform=iOS Simulator,name=iPhone SE (3rd generation),OS=18.5

jobs:
  lint-build:
    name: Lint & build (iPhone 17 Pro)
    if: github.event_name == 'pull_request'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Lint
        run: make lint

      - name: Build
        run: make ci-build

  main-push-full-ci:
    name: Push main — lint, test, UI smoke
    if: github.event_name == 'push'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Full CI (make)
        run: make ci-merge-queue

  merge-queue:
    name: Merge queue — lint, test, UI smoke
    if: github.event_name == 'merge_group'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Full CI (make)
        run: make ci-merge-queue

  pr-full-ci:
    name: PR full-ci — lint, test, UI smoke
    if: >
      github.event_name == 'pull_request' &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'full-ci')
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Full CI (make)
        run: make ci-pr-full-ci
