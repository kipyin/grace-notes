name: CI

# Triggers (avoid duplicate runs):
# - pull_request → PRs targeting main or release lines (default `grace ci`: lint + simulator build; full suite when label `full-ci`).
# - push → main only: full suite (lint, test, UI smoke) unless the merged PR is labeled `no-ci`.
on:
  pull_request:
    # `release/*` matches one segment (e.g. release/0.5.0-build-11); `release/**` did not
    # trigger reliably for release-line PRs in practice.
    branches: [main, "release/*"]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_SIMULATOR_PRO: platform=iOS Simulator,name=iPhone 17 Pro,OS=latest
  CI_SIMULATOR_XR: platform=iOS Simulator,name=iPhone SE (3rd generation),OS=18.5

jobs:
  main-push-gate:
    name: Main push — evaluate no-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      skip_full_ci: ${{ steps.eval.outputs.skip_full_ci }}
    steps:
      - name: Decide whether to skip post-merge full CI
        id: eval
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const relevantPrs = prs.filter(
              (pr) =>
                pr.merged_at != null &&
                pr.base &&
                pr.base.ref === 'main' &&
                pr.merge_commit_sha === context.sha,
            );
            const skip = relevantPrs.some((pr) =>
              pr.labels.some((l) => l.name === 'no-ci'),
            );
            core.setOutput('skip_full_ci', skip ? 'true' : 'false');

  lint-build:
    name: Lint & build (iPhone 17 Pro)
    if: github.event_name == 'pull_request'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install gracenotes-dev (editable + dev)
        run: uv sync --project Scripts/gracenotes-dev --extra dev

      - name: Ruff (check)
        run: uv run --project Scripts/gracenotes-dev ruff check --config Scripts/gracenotes-dev/pyproject.toml Scripts/gracenotes-dev

      - name: Ruff (format)
        run: uv run --project Scripts/gracenotes-dev ruff format --check --config Scripts/gracenotes-dev/pyproject.toml Scripts/gracenotes-dev

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Ensure SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint version

      - name: Lint & build (default CI profile)
        run: uv run --project Scripts/gracenotes-dev grace ci

  main-push-full-ci:
    name: Main push — lint, test, UI smoke
    needs: main-push-gate
    if: >
      always() &&
      needs.main-push-gate.result == 'success' &&
      needs.main-push-gate.outputs.skip_full_ci != 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install gracenotes-dev (editable + dev)
        run: uv sync --project Scripts/gracenotes-dev --extra dev

      - name: Ruff (check)
        run: uv run --project Scripts/gracenotes-dev ruff check --config Scripts/gracenotes-dev/pyproject.toml Scripts/gracenotes-dev

      - name: Ruff (format)
        run: uv run --project Scripts/gracenotes-dev ruff format --check --config Scripts/gracenotes-dev/pyproject.toml Scripts/gracenotes-dev

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Ensure SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint version

      - name: Full CI
        run: uv run --project Scripts/gracenotes-dev grace ci --profile full

  pr-full-ci:
    name: PR full-ci — lint, test, UI smoke
    if: >
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install gracenotes-dev (editable + dev)
        run: uv sync --project Scripts/gracenotes-dev --extra dev

      - name: Ruff (check)
        run: uv run --project Scripts/gracenotes-dev ruff check --config Scripts/gracenotes-dev/pyproject.toml Scripts/gracenotes-dev

      - name: Ruff (format)
        run: uv run --project Scripts/gracenotes-dev ruff format --check --config Scripts/gracenotes-dev/pyproject.toml Scripts/gracenotes-dev

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Ensure SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint version

      - name: Full CI
        run: uv run --project Scripts/gracenotes-dev grace ci --profile full
